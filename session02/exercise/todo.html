<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO App</title>
  </head>
  <body>
    <!-- ============================================
       TODOアプリの HTML を作ろう

       以下の構造を完成させてください:
       1. ヘッダー: アプリのタイトル（h1）
       2. メイン: 入力フォーム + TODOリスト
       3. フッター: 著作権表示

       各TODO項目の構造:
       <li>
         <label>
           <input type="checkbox">
           <span>TODOのテキスト</span>
         </label>
         <button>削除</button>
       </li>
  ============================================ -->

    <!-- ===== ヘッダー ===== -->
    <header>
      <!-- ヒント: h1タグでアプリのタイトルを書こう -->
       <h1>TODO App</h1>
    </header>

    <!-- ===== メインコンテンツ ===== -->
    <main class="todo-card">
      <!-- ----- TODO入力エリア ----- -->
      <!-- ヒント: form (id="todo-form") タグの中に以下を追加
         - input (type="text", id="todo-input", placeholder="新しいTODOを入力...")
         - button (type="submit", テキスト: "追加")
    -->
         <form id="todo-form" class="input-area">
        <input
          type="text"
          id="todo-input"
          class="todo-input"
          placeholder="新しいTODOを入力..."
        />
        <button type="submit" class="todo-button">追加</button>
      </form>

      <!-- ----- TODOリスト表示エリア ----- -->
      <!-- ヒント: ul (id="todo-list") の中に li を3つ以上追加
         各liには label でcheckboxとspanを包み、後ろに削除ボタンを置く
         1つは checked をつけて完了済みにしてみよう
    --><ul id="todo-list" class="todo-list">
        <li class="todo-item">
          <label class="todo-label">
            <input type="checkbox" class="todo-checkbox" />
            <span class="todo-title">買い物に行く</span>
          </label>
          <button class="delete-button">削除</button>
        </li>

        <li class="todo-item">
          <label class="todo-label">
            <input type="checkbox" class="todo-checkbox" />
            <span class="todo-title">レポートを書く</span>
          </label>
          <button class="delete-button">削除</button>
        </li>

        <li class="todo-item done">
          <label class="todo-label">
            <input type="checkbox" class="todo-checkbox" checked />
            <span class="todo-title">本を読む</span>
          </label>
          <button class="delete-button">削除</button>
        </li>

        <li class="todo-item">
          <label class="todo-label">
            <input type="checkbox" class="todo-checkbox" />
            <span class="todo-title">部屋を掃除する</span>
          </label>
          <button class="delete-button">削除</button>
        </li>
      </ul>
    </main>

    <!-- ===== フッター ===== -->
    <footer class="footer">
      <!-- ヒント: <p>&copy; 2026 TODO App</p> -->
       <p>&copy; 2026 TODO App</p>
    </footer>
  </body>
</html>
