<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch API GET デモ</title>
    <style>
      body {
        font-family:
          "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
        background-color: #f5f5f5;
      }
      h1 {
        color: #2563eb;
      }
      button {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background-color: #1d4ed8;
      }
      #result {
        margin-top: 20px;
        padding: 16px;
        background-color: white;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        min-height: 100px;
        white-space: pre-wrap;
        font-family: monospace;
        font-size: 14px;
      }
      .info {
        background-color: #dbeafe;
        border-left: 4px solid #2563eb;
        padding: 12px 16px;
        margin-bottom: 20px;
        border-radius: 0 8px 8px 0;
      }
    </style>
  </head>
  <body>
    <h1>Fetch API GET デモ</h1>

    <div class="info">
      <p>
        <strong>このデモの目的:</strong>
        JavaScriptからGETリクエストを送信し、サーバーからTODO一覧を取得します。
      </p>
      <p>
        開発者ツールの <strong>Console</strong> タブと
        <strong>Network</strong> タブを開いてから操作してください。
      </p>
    </div>

    <button onclick="getTodos()">TODOを取得（GET /todos）</button>

    <h2>取得結果:</h2>
    <div id="result">ボタンを押すとここに結果が表示されます</div>

    <script>
      // =====================================================
      // Fetch API を使った GET リクエストのデモ
      // =====================================================

      // このページは FastAPI の static フォルダから配信される。
      // 画面とAPIが同じサーバー（同一オリジン）なので、相対パス "/todos" で呼べる。

      // async/await を使った GET リクエスト
      async function getTodos() {
        console.log("--- GET /todos を実行します ---");

        try {
          // Step 1: fetch() でGETリクエストを送信
          //   fetch() はデフォルトでGETメソッドを使う
          console.log("Step 1: fetch() でリクエスト送信...");
          const response = await fetch("/todos");

          // Step 2: レスポンスのステータスを確認
          console.log("Step 2: レスポンス受信");
          console.log("  ステータスコード:", response.status);
          console.log("  OK?:", response.ok);

          // Step 3: レスポンスのbodyをJSON形式で解析
          //   response.json() はPromiseを返すのでawaitが必要
          console.log("Step 3: JSONを解析中...");
          const data = await response.json();

          // Step 4: 取得したデータを表示
          console.log("Step 4: データ取得完了!");
          console.log("  取得したTODO一覧:", data);
          console.log("  TODO数:", data.length);

          // 画面にも表示
          const resultDiv = document.getElementById("result");
          resultDiv.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          // エラーが発生した場合（サーバーが起動していないなど）
          console.error("エラーが発生しました:", error);
          document.getElementById("result").textContent =
            "エラー: " +
            error.message +
            "\n\nサーバーが起動しているか確認してください。";
        }
      }
    </script>
  </body>
</html>
